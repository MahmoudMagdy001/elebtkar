<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - الصفحة غير موجودة | الابتكار</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/shared.css">
  <link rel="stylesheet" href="/pages/404/404.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div class="error-container">
    <div class="error-bg-shapes">
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="grid"></div>
    </div>
    
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">عذراً، هذه الصفحة غير متوفرة!</h1>
      <p class="error-message">يبدو أنك وصلت لمكان غير مألوف. الصفحة التي تبحث عنها غير متوفرة حالياً أو تم نقلها.</p>
      
      <div class="error-actions">
        <a href="/" class="btn-primary">العودة للرئيسية ←</a>
        <a href="/blog" class="btn-secondary">تصفح المدونة</a>
      </div>
    </div>
    
    <div class="error-float-icon">
      <i class="ph ph-warning-diamond"></i>
    </div>
  </div>

  <script src="/pages/404/404.js"></script>
</body>
</html>
