<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة إدارة المدونة | الأبتكار</title>
  <!-- Block search engines from indexing the private dashboard -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="../../assets/css/shared.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<!-- ── Dashboard Header ── -->
<header class="dash-header">
  <a href="../home/index.html">
    <img src="../../logo.png" alt="الأبتكار" class="logo-img" />
  </a>
  <div class="dash-title"><i class="ph-duotone ph-notebook-duotone"></i> لوحة إدارة المدونة</div>
  <a href="../home/index.html" class="dash-back-link">
    <i class="ph ph-arrow-left"></i> العودة للموقع
  </a>
</header>

<!-- ── Main Container ── -->
<main class="dash-container">
  <div class="dash-card">
    <div class="dash-card-header">
      <i class="ph-duotone ph-plus-circle"></i>
      <h1>إضافة مقالة جديدة</h1>
    </div>

    <div class="dash-card-body">
      <form id="postForm" novalidate>

        <!-- Arabic Title (for display) -->
        <div class="field-group">
          <label for="title">عنوان المقالة (بالعربية) <span class="required">*</span></label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="مثال: كيف تحسّن ترتيب موقعك في جوجل"
            required
          />
        </div>

        <!-- English Title → Slug -->
        <div class="field-group">
          <label for="titleEn">العنوان بالإنجليزية (لإنشاء الرابط) <span class="required">*</span></label>
          <input
            type="text"
            id="titleEn"
            name="titleEn"
            placeholder="How to Improve Your Google Ranking"
            class="ltr-field"
            dir="ltr"
            style="text-align:left"
            required
          />
          <p class="field-hint">يُستخدم لإنشاء رابط المقالة تلقائياً — يُرجى كتابته بالإنجليزية.</p>
        </div>

        <!-- Slug (LTR, auto-generated but editable) -->
        <hr class="form-divider" />
        <div class="field-group">
          <label for="slug">رابط (Slug) المقالة <span class="required">*</span></label>
          <div class="slug-row">
            <div class="field-group" style="margin:0">
              <input
                type="text"
                id="slug"
                name="slug"
                placeholder="how-to-improve-your-google-ranking"
                required
                autocomplete="off"
              />
            </div>
            <button type="button" class="btn-regen" id="regenSlug" title="إعادة توليد من العنوان الإنجليزي">
              <i class="ph ph-arrows-clockwise"></i>
            </button>
          </div>
          <p class="field-hint">post.html?slug=<strong id="slugPreview">…</strong></p>
        </div>

        <hr class="form-divider" />

        <!-- Meta Description -->
        <div class="field-group">
          <label for="metaDescription">وصف ميتا (Meta Description) <span class="required">*</span></label>
          <input
            type="text"
            id="metaDescription"
            name="metaDescription"
            placeholder="وصف مختصر يظهر في نتائج البحث — يُفضَّل بين 120 و 155 حرفاً"
            maxlength="160"
            required
          />
          <div class="meta-counter ok" id="metaCounter">0 / 155 حرف</div>
        </div>

        <!-- Content -->
        <div class="field-group">
          <label for="content">محتوى المقالة <span class="required">*</span></label>
          <textarea
            id="content"
            name="content"
            placeholder="اكتب محتوى مقالتك هنا..."
            required
          ></textarea>
        </div>

        <hr class="form-divider" />

        <!-- Featured Image Upload -->
        <div class="field-group">
          <label>الصورة المميزة <span class="required">*</span></label>
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="featuredImage" name="featuredImage" accept="image/*" required />
            <div class="upload-icon"><i class="ph-duotone ph-image"></i></div>
            <p>اسحب الصورة هنا أو اضغط للاختيار</p>
            <p class="upload-hint">PNG، JPG، WebP — الحد الأقصى 5 MB</p>
          </div>
          <img id="imagePreview" src="" alt="معاينة الصورة" />
        </div>

        <!-- Alt Text -->
        <div class="field-group">
          <label for="altText">النص البديل للصورة (Alt Text) <span class="required">*</span></label>
          <input
            type="text"
            id="altText"
            name="altText"
            placeholder="وصف دقيق للصورة لمحركات البحث وإمكانية الوصول"
            required
          />
          <p class="field-hint">مهم جداً لـ SEO — صف محتوى الصورة بدقة.</p>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="submitBtn">
          <div class="spinner" id="submitSpinner"></div>
          <i class="ph-duotone ph-cloud-arrow-up" id="submitIcon"></i>
          <span id="submitLabel">نشر المقالة</span>
        </button>

      </form>
    </div>
  </div>
</main>

<!-- ── Toast Notification ── -->
<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<!-- ── Scripts ── -->
<script src="../../assets/js/blog-logic.js"></script>
<script src="admin.js"></script>
</body>
</html>
