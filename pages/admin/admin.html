<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة إدارة المدونة | الابتكار</title>
  <!-- Block search engines from indexing the private dashboard -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/shared.css" />
  <link rel="stylesheet" href="/pages/admin/admin.css" />
</head>
<body>

<!-- ── Login Section ── -->
<div class="login-container" id="loginContainer" style="display: none;">
  <div class="login-card">
    <div class="login-header">
      <img src="/logo.png" alt="الابتكار" class="logo-img" />
      <h2>تسجيل الدخول</h2>
      <p>الرجاء إدخال بيانات الاعتماد للوصول للوحة الإدارة</p>
    </div>
    <form id="loginForm">
      <div class="field-group">
        <label for="loginEmail">البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="admin@example.com" required dir="ltr" style="text-align: left;" />
      </div>
      <div class="field-group">
        <label for="loginPassword">كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required dir="ltr" style="text-align: left;" />
      </div>
      <button type="submit" class="submit-btn" id="loginBtn">
        <div class="spinner" id="loginSpinner"></div>
        <i class="ph-duotone ph-sign-in" id="loginIcon"></i>
        <span id="loginLabel">دخول</span>
      </button>
    </form>
  </div>
</div>

<!-- ── Dashboard Header ── -->
<header class="dash-header" id="dashHeader" style="display: none;">
  <a href="/">
    <img src="/logo.png" alt="الابتكار" class="logo-img" />
  </a>
  <div class="dash-title"><i class="ph-duotone ph-notebook-duotone"></i> لوحة إدارة المدونة</div>
  <div class="dash-actions">
    <a href="/" class="dash-back-link">
      <i class="ph ph-arrow-left"></i> العودة للموقع
    </a>
  </div>
</header>

<!-- ── Main Container ── -->
<div class="dash-wrapper" id="dashWrapper" style="display: none;">
  <!-- Sidebar -->
  <aside class="dash-sidebar">
    <div class="sidebar-header">
      <img src="/logo.png" alt="الابتكار" class="sidebar-logo">
      <span>لوحة التحكم</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-section="addPost">
        <i class="ph-duotone ph-plus-circle"></i>
        <span>إضافة مقالة</span>
      </button>
      <button class="nav-item" data-section="discountCodes">
        <i class="ph-duotone ph-ticket"></i>
        <span>أكواد الخصم</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <button id="logoutBtnSidebar" class="btn-logout-sidebar">
        <i class="ph ph-sign-out"></i>
        <span>تسجيل الخروج</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="dash-main-content">
    
    <!-- Section: Add Post -->
    <section id="addPostSection" class="admin-section active">
      <div class="dash-card">
        <div class="dash-card-header">
          <i class="ph-duotone ph-plus-circle"></i>
          <h1>إضافة مقالة جديدة</h1>
        </div>
        <div class="dash-card-body">
          <form id="postForm" novalidate>
            <!-- Arabic Title -->
            <div class="field-group">
              <label for="title">عنوان المقالة (بالعربية) <span class="required">*</span></label>
              <input type="text" id="title" name="title" placeholder="مثال: كيف تحسّن ترتيب موقعك في جوجل" required />
            </div>

            <!-- English Title → Slug -->
            <div class="field-group">
              <label for="titleEn">العنوان بالإنجليزية (لإنشاء الرابط) <span class="required">*</span></label>
              <input type="text" id="titleEn" name="titleEn" placeholder="How to Improve Your Google Ranking" class="ltr-field" dir="ltr" style="text-align:left" required />
            </div>

            <!-- Slug -->
            <hr class="form-divider" />
            <div class="field-group">
              <label for="slug">رابط (Slug) المقالة <span class="required">*</span></label>
              <div class="slug-row">
                <input type="text" id="slug" name="slug" placeholder="how-to-improve-your-google-ranking" required autocomplete="off" />
                <button type="button" class="btn-regen" id="regenSlug" title="إعادة توليد">
                  <i class="ph ph-arrows-clockwise"></i>
                </button>
              </div>
              <p class="field-hint">رابط المقالة: <strong id="slugPreview">…</strong></p>
            </div>

            <!-- Meta Description -->
            <div class="field-group">
              <label for="metaDescription">وصف ميتا (Meta Description) <span class="required">*</span></label>
              <input type="text" id="metaDescription" name="metaDescription" placeholder="وصف مختصر يظهر في نتائج البحث" maxlength="155" required />
              <div class="meta-counter ok" id="metaCounter">0 / 155 حرف</div>
            </div>

            <!-- Content -->
            <div class="field-group">
              <label for="content">محتوى المقالة <span class="required">*</span></label>
              <textarea id="content" name="content" placeholder="اكتب محتوى مقالتك هنا..." required></textarea>
            </div>

            <!-- Image Upload -->
            <div class="field-group">
              <label>الصورة المميزة <span class="required">*</span></label>
              <div class="upload-zone" id="uploadZone">
                <input type="file" id="featuredImage" name="featuredImage" accept="image/*" required />
                <div class="upload-icon"><i class="ph-duotone ph-image"></i></div>
                <p>اسحب الصورة هنا أو اضغط للاختيار</p>
              </div>
              <img id="imagePreview" src="" alt="معاينة الصورة" />
            </div>

            <!-- Alt Text -->
            <div class="field-group">
              <label for="altText">النص البديل للصورة (Alt Text) <span class="required">*</span></label>
              <input type="text" id="altText" name="altText" placeholder="وصف الصورة لمحركات البحث" required />
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
              <div class="spinner" id="submitSpinner"></div>
              <i class="ph-duotone ph-cloud-arrow-up" id="submitIcon"></i>
              <span id="submitLabel">نشر المقالة</span>
            </button>
          </form>
        </div>
      </div>
    </section>

    <!-- Section: Discount Codes -->
    <section id="discountCodesSection" class="admin-section">
      <div class="dash-card">
        <div class="dash-card-header">
          <i class="ph-duotone ph-ticket"></i>
          <h1>أكواد الخصم المولدة</h1>
          <button id="refreshCodes" class="btn-refresh" title="تحديث البيانات">
            <i class="ph ph-arrows-clockwise"></i>
          </button>
        </div>
        <div class="dash-card-body">
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>التاريخ</th>
                  <th>الاسم</th>
                  <th>رقم الجوال</th>
                  <th>كود الخصم</th>
                </tr>
              </thead>
              <tbody id="discountCodesTableBody">
                <!-- Data will be loaded here -->
                <tr>
                  <td colspan="4" style="text-align:center; padding: 2rem;">جاري تحميل البيانات...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- ── Toast Notification ── -->
<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<!-- ── Scripts ── -->
<script src="/js/config.js"></script>
<script src="/assets/js/blog-logic.js"></script>
<script src="/pages/admin/admin.js"></script>
</body>
</html>
