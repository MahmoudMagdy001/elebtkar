<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المدونة | الابتكار</title>
  <meta name="description" content="مقالات واستراتيجيات في التسويق الرقمي، السيو، وبناء الحضور الرقمي من فريق الابتكار." />
  <meta property="og:title"       content="مدونة الابتكار" />
  <meta property="og:description" content="مقالات واستراتيجيات في التسويق الرقمي والتقنية." />
  <meta property="og:type"        content="website" />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Shared styles -->
  <link rel="stylesheet" href="/assets/css/shared.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/pages/blog/blog.css" />
</head>
<body>

<!-- NAV PLACEHOLDER -->
<div id="navbar-placeholder"></div>

<!-- ── Hero ── -->
<div class="blog-hero">
  <span class="section-tag">مدونة الابتكار</span>
  <h1>مقالات في التسويق الرقمي والتقنية</h1>
  <p>استراتيجيات ونصائح عملية لتنمية نشاطك التجاري رقمياً في السوق السعودي</p>
</div>

<!-- ── Blog Grid ── -->
<main class="blog-container">
  <div class="posts-grid" id="postsGrid">

    <!-- Skeleton cards while loading -->
    <div class="sk-card" id="sk1">
      <div class="skeleton sk-card-img"></div>
      <div class="sk-card-body">
        <div class="skeleton sk-line sk-short"></div>
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line sk-short"></div>
      </div>
    </div>
    <div class="sk-card" id="sk2">
      <div class="skeleton sk-card-img"></div>
      <div class="sk-card-body">
        <div class="skeleton sk-line sk-short"></div>
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line sk-short"></div>
      </div>
    </div>
    <div class="sk-card" id="sk3">
      <div class="skeleton sk-card-img"></div>
      <div class="sk-card-body">
        <div class="skeleton sk-line sk-short"></div>
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line sk-short"></div>
      </div>
    </div>

  </div>

  <!-- Empty state (hidden by default) -->
  <div id="emptyState" class="state-center" style="display:none;">
    <div class="state-icon"><i class="ph ph-duotone ph-notebook"></i></div>
    <h2>لا توجد مقالات بعد</h2>
    <p>سيتم نشر مقالات قريباً. تابعنا على منصات التواصل الاجتماعي.</p>
    <a href="/" class="btn-primary" style="margin-top:1.5rem;display:inline-flex;">العودة للرئيسية</a>
  </div>

  <!-- Error state (hidden by default) -->
  <div id="errorState" class="state-center" style="display:none;">
    <div class="state-icon"><i class="ph ph-duotone ph-warning-circle"></i></div>
    <h2>تعذّر تحميل المقالات</h2>
    <p>تحقق من اتصالك بالإنترنت أو حاول مجدداً لاحقاً.</p>
  </div>
</main>

<!-- FOOTER -->
<div id="footer-placeholder"></div>
<script src="/assets/js/footer-loader.js" defer></script>

<!-- CONTACT WIDGET PLACEHOLDER -->
<div id="contact-widget-placeholder"></div>

<!-- ── Scripts ── -->
<script src="/assets/js/config.js"></script>
<script src="/assets/js/helpers.js"></script>
<script src="/assets/js/component-loader.js"></script>
<script src="/assets/js/blog-logic.js"></script>
<script src="/pages/blog/blog.js"></script>
</body>
</html>
