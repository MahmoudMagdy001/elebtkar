<!-- ── Blog Grid ── -->
<main class="blog-container" id="main-content">
  <div class="posts-grid" id="postsGrid">

    <!-- Skeleton cards while loading -->
    <div class="sk-card" id="sk1">
      <div class="skeleton sk-card-img"></div>
      <div class="sk-card-body">
        <div class="skeleton sk-line sk-short"></div>
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line sk-short"></div>
      </div>
    </div>
    <div class="sk-card" id="sk2">
      <div class="skeleton sk-card-img"></div>
      <div class="sk-card-body">
        <div class="skeleton sk-line sk-short"></div>
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line sk-short"></div>
      </div>
    </div>
    <div class="sk-card" id="sk3">
      <div class="skeleton sk-card-img"></div>
      <div class="sk-card-body">
        <div class="skeleton sk-line sk-short"></div>
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line sk-short"></div>
      </div>
    </div>

  </div>

  <!-- Empty state (hidden by default) -->
  <div id="emptyState" class="state-center" style="display:none;">
    <div class="state-icon"><i class="ph ph-duotone ph-notebook"></i></div>
    <h2>لا توجد مقالات بعد</h2>
    <p>سيتم نشر مقالات قريباً. تابعنا على منصات التواصل الاجتماعي.</p>
    <a href="/" class="btn-primary" style="margin-top:1.5rem;display:inline-flex;">العودة للرئيسية</a>
  </div>

  <!-- Error state (hidden by default) -->
  <div id="errorState" class="state-center" style="display:none;">
    <div class="state-icon"><i class="ph ph-duotone ph-warning-circle"></i></div>
    <h2>تعذّر تحميل المقالات</h2>
    <p>تحقق من اتصالك بالإنترنت أو حاول مجدداً لاحقاً.</p>
  </div>
</main>
