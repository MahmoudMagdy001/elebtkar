<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/assets/images/logs.png" />

  <!-- ─ SEO placeholders – updated dynamically before content renders ─ -->
  <title>تحميل… | الابتكار</title>
  <meta name="description" content="جاري تحميل المقال..." />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type"        content="article" />
  <meta property="og:site_name"   content="الابتكار" />
  <meta property="og:locale"      content="ar_SA" />
  <meta property="og:title"       content="" id="ogTitle" />
  <meta property="og:description" content="" id="ogDesc" />
  <meta property="og:image"       content="" id="ogImage" />
  <meta property="og:url"         content="" id="ogUrl" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="" id="twTitle" />
  <meta name="twitter:description" content="" id="twDesc" />
  <meta name="twitter:image"       content="" id="twImage" />

  <!-- Canonical (set dynamically) -->
  <link rel="canonical" href="" id="canonicalTag" />

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/shared.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/pages/post/post.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">انتقل إلى المحتوى الرئيسي</a>

<!-- NAV PLACEHOLDER -->
<div id="navbar-placeholder"></div>

<!-- ── Main Content ── -->
<main class="post-layout" id="main-content">

  <!-- Skeleton shown while loading -->
  <div id="skeletonState">
    <div class="skeleton sk-img"></div>
    <div style="background:var(--white);border-radius:var(--radius);padding:2.5rem 3rem;box-shadow:var(--shadow-md);">
      <div class="skeleton sk-line sk-short" style="width:25%;margin-bottom:1.5rem;"></div>
      <div class="skeleton sk-title"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line sk-short"></div>
    </div>
  </div>

  <!-- Populated by JS -->
  <div id="postContent" style="display:none;"></div>

  <!-- Error state (hidden by default) -->
  <div id="errorState" style="display:none;" class="state-box">
    <div class="state-icon"><i class="ph ph-duotone ph-magnifying-glass"></i></div>
    <h2>المقالة غير موجودة</h2>
    <p>لم نتمكن من إيجاد المقالة المطلوبة. ربما تم حذفها أو تغيير رابطها.</p>
    <a href="/" class="btn-primary" style="margin-top:1.5rem;display:inline-flex;">العودة للرئيسية</a>
  </div>

</main>

<!-- FOOTER -->
<div id="footer-placeholder"></div>
<script src="/assets/js/footer-loader.js" defer></script>

<!-- CONTACT WIDGET PLACEHOLDER -->
<div id="contact-widget-placeholder"></div>

<!-- ── Scripts ── -->
<script src="/assets/js/config.js"></script>
<script src="/assets/js/helpers.js"></script>
<script src="/assets/js/component-loader.js"></script>
<script src="/assets/js/blog-logic.js"></script>
<script src="/assets/js/render.js"></script>
<script src="/pages/post/post.js"></script>
</body>
</html>
