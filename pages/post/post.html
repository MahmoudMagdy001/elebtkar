<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ─ SEO placeholders – updated dynamically before content renders ─ -->
  <title>تحميل…</title>
  <meta name="description" content="" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type"        content="article" />
  <meta property="og:title"       content="" />
  <meta property="og:description" content="" />
  <meta property="og:image"       content="" />
  <meta property="og:url"         content="" />
  <meta property="og:site_name"   content="الأبتكار" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="" />
  <meta name="twitter:description" content="" />
  <meta name="twitter:image"       content="" />

  <!-- Canonical (set dynamically) -->
  <link rel="canonical" href="" id="canonicalTag" />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/shared.css" />
  <link rel="stylesheet" href="/pages/post/post.css" />
</head>
<body>

<!-- ── Sticky Nav ── -->
<nav class="post-header-nav">
  <a href="/home">
    <img src="/logo.png" alt="الأبتكار" class="nav-home-logo" />
  </a>
  <a href="/home">
    <i class="ph ph-house"></i> الرئيسية
  </a>
</nav>

<!-- ── Main Content ── -->
<main class="post-layout" id="postLayout">

  <!-- Skeleton shown while loading -->
  <div id="skeletonState">
    <div class="skeleton sk-img"></div>
    <div style="background:var(--white);border-radius:var(--radius);padding:2.5rem 3rem;box-shadow:var(--shadow-md);">
      <div class="skeleton sk-line sk-short" style="width:25%;margin-bottom:1.5rem;"></div>
      <div class="skeleton sk-title"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line sk-short"></div>
    </div>
  </div>

  <!-- Populated by JS -->
  <div id="postContent" style="display:none;"></div>

  <!-- Error state (hidden by default) -->
  <div id="errorState" style="display:none;" class="state-box">
    <div class="state-icon">🔍</div>
    <h2>المقالة غير موجودة</h2>
    <p>لم نتمكن من إيجاد المقالة المطلوبة. ربما تم حذفها أو تغيير رابطها.</p>
    <a href="/home" class="btn-primary" style="margin-top:1.5rem;display:inline-flex;">العودة للرئيسية</a>
  </div>

</main>

<!-- Floating contact widget -->
<div class="contact-menu" id="contactMenu">
  <div class="contact-options">
    <a href="https://wa.me/966579644123" target="_blank" class="contact-item whatsapp" aria-label="واتساب">
      <span class="contact-tooltip">واتساب</span>
      <span class="contact-icon"><i class="ph-fill ph-whatsapp-logo"></i></span>
    </a>
    <a href="tel:+966579644123" class="contact-item phone" aria-label="اتصال">
      <span class="contact-tooltip">اتصال</span>
      <span class="contact-icon"><i class="ph-fill ph-phone-call"></i></span>
    </a>
  </div>
  <button class="contact-toggle" onclick="toggleContactMenu()" aria-label="تواصل معنا">
    <span class="toggle-icon"><i class="ph-fill ph-chats-circle"></i></span>
  </button>
</div>

<!-- Back to top -->
<button id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="عودة للأعلى">↑</button>

<!-- ── Scripts ── -->
<script src="/assets/js/blog-logic.js"></script>
<script src="/pages/post/post.js"></script>
</body>
</html>
