    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تأكيد الدفع | الابتكار</title>
    <link rel="icon" type="image/png" href="/assets/images/logs.png" />
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/shared.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <style>
        .callback-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .status-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: none;
        }
        .status-success { color: #4CAF50; }
        .status-error { color: #F44336; }
        
        h2 { margin-bottom: 1rem; color: #fff; }
        p { color: rgba(255, 255, 255, 0.7); margin-bottom: 2rem; line-height: 1.6; }
    </style>
    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
      // Ensure Supabase library loads, with timeout fallback
      (function() {
        let retries = 0;
        const maxRetries = 30;
        const checkSupabaseInterval = setInterval(() => {
          if (window.supabase) {
            console.log('[Supabase] Library loaded successfully');
            clearInterval(checkSupabaseInterval);
          } else if (++retries >= maxRetries) {
            console.warn('[Supabase] Library failed to load after', maxRetries * 100, 'ms, marking as unavailable');
            window.supabase = null;
            clearInterval(checkSupabaseInterval);
          }
        }, 100);
      })();
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body class="dark-theme">

    <div class="callback-container">
        <div class="status-card" id="statusCard">
            <div class="loader" id="mainLoader"></div>
            <div class="status-icon" id="statusIcon"></div>
            <h2 id="statusTitle">جاري التحقق من عملية الدفع...</h2>
            <p id="statusMessage">يرجى عدم إغلاق الصفحة أو الضغط على زر الرجوع.</p>
            <div id="statusActions" style="display: none;">
                <a href="/services" class="btn-primary">العودة للخدمات</a>
            </div>
        </div>
    </div>

    <script src="/assets/js/config.js"></script>
    <script src="/pages/services/payment-callback.js"></script>
</body>
</html>
