<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/assets/images/logs.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="خدمات الابتكار المتكاملة لتنمية نشاطك التجاري بأحدث التقنيات الرقمية المبتكرة." />
  <title>خدماتنا المتكاملة | الابتكار</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet" />
  
  <!-- GSAP & ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  
  <!-- Global Shared CSS -->
  <link rel="stylesheet" href="/assets/css/shared.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <!-- Services CSS -->
  <link rel="stylesheet" href="/pages/services/services.css" />
  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  
  <!-- Moyasar Form -->
  <link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.14.0/moyasar.css" />
  <script src="https://polyfill.io/v3/polyfill.min.js?features=fetch"></script>
  <script src="https://cdn.moyasar.com/mpf/1.14.0/moyasar.js"></script>
</head>
<body>
  <!-- Progress Bar -->
  <div class="reading-progress" id="progress-bar"></div>

  <!-- NAV PLACEHOLDER -->
  <div id="navbar-placeholder"></div>

  <!-- HERO SECTION -->
  <header class="services-hero">
    <div class="hero-bg-shapes">
      <div class="hero-shape"></div>
      <div class="hero-shape"></div>
      <div class="hero-shape"></div>
      <div class="hero-grid"></div>
    </div>
    <div class="hero-content">
      <h1 class="hero-title" id="typewriter"></h1>
      <p class="hero-subtitle fade-in-up">حلول رقمية متخصصة لتنمية نشاطك التجاري</p>
    </div>
    <div class="scroll-indicator">
      <i class="ph ph-caret-double-down"></i>
    </div>
  </header>

  <!-- SERVICES MAIN -->
  <main class="services-container" id="services-list-container">
    <div class="flex-center py-5" id="services-loader">
      <p style="color:var(--white); opacity:0.7;">جاري تحميل الخدمات...</p>
    </div>
  </main>

  <!-- PRICING PLANS -->
  <section id="pricing">
    <div class="section-inner">
      <div class="fade-in text-center mb-4">
        <span class="section-tag section-tag--dark">حلول الابتكار</span>
        <h2 class="section-title section-title--white">حلول تناسب جميع احتياجاتك</h2>
        <p class="section-subtitle section-subtitle--white mx-auto">اختر الابتكار الأنسب لنمو نشاطك التجاري</p>
      </div>
      <div class="pricing-grid fade-in" id="pricingContainer">
        <!-- Pricing cards will be rendered dynamically by JS -->
      </div>
    </div>
  </section>

  <!-- CTA Section at Bottom -->
  <section class="final-cta services-cta">
    <div class="cta-content">
      <h2>هل أنت جاهز لتنمية نشاطك الرقمي؟</h2>
      <p class="text-muted mb-3" style="font-size: 1.15rem;">فريقنا من الخبراء جاهز لمساعدتك في كل خطوة</p>
      <div class="cta-actions flex-center flex-wrap gap-1" style="flex-direction: row-reverse;">
        <a href="https://wa.me/966579644123" target="_blank" class="btn-primary btn-pulse">ابدأ مشروعك الآن</a>
        <a href="/#contact" class="btn-secondary">تواصل معنا</a>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>
  
  <!-- CONTACT WIDGET PLACEHOLDER -->
  <div id="contact-widget-placeholder"></div>

  <!-- PAYMENT MODAL -->
  <div id="paymentModal" class="payment-modal">
    <div class="modal-content">
      <button class="modal-close" id="closePaymentModal">&times;</button>
      <div class="modal-header">
        <h3 id="paymentPlanTitle">إتمام الطلب</h3>
        <p id="paymentPlanPrice"></p>
      </div>
      
      <!-- USER DETAILS FORM -->
      <div id="paymentCustomerForm" class="payment-customer-form">
        <div class="field-group">
          <label>الاسم الكامل</label>
          <input type="text" id="custName" placeholder="ادخل اسمك" required />
        </div>
        <div class="field-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="custEmail" placeholder="example@mail.com" required dir="ltr" />
        </div>
        <div class="field-group">
          <label>رقم الجوال</label>
          <input type="tel" id="custPhone" placeholder="05xxxxxxxx" required dir="ltr" />
        </div>
        <button type="button" class="btn-primary" id="proceedToPay" style="width:100%; justify-content:center;">الانتقال للدفع</button>
      </div>

      <div class="mysr-form" style="display: none;"></div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/helpers.js"></script>
  <script src="/assets/js/component-loader.js"></script>
  
  <!-- Services specific JS -->
  <script src="/assets/js/payment-logic.js"></script>
  <script src="/pages/services/services.js"></script>
</body>
</html>
