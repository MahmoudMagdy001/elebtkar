  <script>
    // Ensure Supabase library loads, with timeout fallback
    (function() {
      let retries = 0;
      const maxRetries = 30;
      const checkSupabaseInterval = setInterval(() => {
        if (window.supabase) {
          console.log('[Supabase] Library loaded successfully');
          clearInterval(checkSupabaseInterval);
        } else if (++retries >= maxRetries) {
          console.warn('[Supabase] Library failed to load after', maxRetries * 100, 'ms, marking as unavailable');
          window.supabase = null;
          clearInterval(checkSupabaseInterval);
        }
      }, 100);
    })();
  </script>
